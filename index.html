<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ishntt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage" aria-label="Monkey King cinematic landing page">
    <img class="background-fill" src="assets/1.png" alt="" aria-hidden="true">
    <div class="scene-frame" aria-hidden="true">
      <img class="background-image" src="assets/1.png" alt="">
    </div>
    <div class="fog-layer fog-back" aria-hidden="true"></div>
    <div class="fog-layer fog-front" aria-hidden="true"></div>
    <div class="depth-vignette" aria-hidden="true"></div>
    <canvas class="particles" id="particles" aria-hidden="true"></canvas>
    <div class="cursor-aura" id="cursorAura" aria-hidden="true"></div>

    <section class="hero-content">
      <p class="kicker">The staff answers</p>
      <h1>ishntt</h1>
      <p class="hero-copy">
        Command the golden staff with a touch. Ancient fire, celestial iron,
        and a kingdom of clouds bend toward your movement.
      </p>
      <div class="actions" aria-label="Primary actions">
        <a class="glass-button primary welcome-button" href="#" aria-label="Welcome">Welcome</a>
      </div>
    </section>

    <div class="relic-field" aria-hidden="true">
      <div class="aura aura-one"></div>
      <div class="aura aura-two"></div>
      <div class="staff-shell" id="staffShell">
        <div class="staff-glow"></div>
        <div class="staff-energy energy-core"></div>
        <div class="staff-energy energy-sweep"></div>
        <div class="tip-bloom"></div>
        <img class="staff" id="staff" src="assets/2.png" alt="">
      </div>
    </div>

    <aside class="cinematic-panel" aria-label="Legend status">
      <span>Celestial focus</span>
      <strong>99%</strong>
    </aside>

    <div class="audio-ready" data-hover-sound data-magic-hum data-ambient-music aria-hidden="true"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
